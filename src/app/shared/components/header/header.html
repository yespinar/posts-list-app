<header class="bg-green-50 min-h-16 flex flex-col sm:flex-row sm:items-center overflow-x-hidden">
  <div class="flex items-center justify-between px-4 py-3 sm:flex-none sm:justify-start sm:py-0">
    <h1 class="font-bold text-2xl whitespace-nowrap">{{ title }}</h1>
    <div class="flex items-center gap-2 sm:hidden">
      <button type="button" class="header-icon-button" (click)="toggleSearch()" aria-label="Toggle search">
        <i class="pi pi-search" aria-hidden="true"></i>
      </button>
      <button type="button" class="header-icon-button" (click)="toggleLanguage()" aria-label="Change language">
        {{ languageSelected() === 'en' ? 'EN' : 'ES' }}
      </button>
      <button type="button" class="header-icon-button" (click)="onLogout()" aria-label="Logout">
        <i class="pi pi-sign-out" aria-hidden="true"></i>
      </button>
    </div>
  </div>
  <div class="hidden sm:flex flex-1 items-center justify-end px-4 gap-4 header-right">
    <p-floatlabel variant="on" class="min-w-0 flex-1 md:max-w-sm">
      <input pInputText id="search" [(ngModel)]="search" autocomplete="off" pSize="small" class="w-full" />
      <label for="search">{{ 'HEADER.SEARCH_PLACEHOLDER' | translate }}</label>
    </p-floatlabel>
    <p-selectbutton [options]="languageOptions" optionLabel="label" optionValue="value" size="small" allowEmpty="false"
      [ngModel]="languageSelected()" (ngModelChange)="onLanguageChange($event)" />
    <p-button label="{{ 'HEADER.LOGOUT' | translate }}" size="small" (click)="onLogout()" />
  </div>

  @if(searchOpen()) {
  <div class="sm:hidden px-4 pb-3">
    <p-floatlabel variant="on" class="w-full">
      <input pInputText id="search-mobile" [(ngModel)]="search" autocomplete="off" pSize="small" class="w-full" />
      <label for="search-mobile">{{ 'HEADER.SEARCH_PLACEHOLDER' | translate }}</label>
    </p-floatlabel>
  </div>
  }
</header>
