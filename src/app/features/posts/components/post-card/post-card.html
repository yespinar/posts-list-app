<li class="rounded border border-slate-200 bg-white p-4 flex flex-col gap-3 hover:cursor-pointer" (click)="onClick()">
  <div class="flex items-center justify-between gap-3">
    <h4 class="font-semibold">{{ post()?.title }}</h4>
    <span class="text-xs uppercase tracking-[0.12em] text-slate-500">{{ post()?.createdAt | date: 'mediumDate' }}</span>
  </div>

  
  <p class="mt-3 text-sm text-slate-700">{{ post()?.body }}</p>

  <div class="flex justify-between items-start gap-4">
    <div class="flex items-center gap-3">
      <div class="flex items-center gap-2">
        <p-avatar [image]="authorAvatar()" shape="circle" ></p-avatar>
        <p class="font-medium">{{ authorName() }}</p>
      </div>
    </div>

    <div class="mt-3 flex flex-wrap gap-2">
      @for (tag of post()?.tags ?? []; track tag) {
        <span class="rounded-full bg-slate-100 px-3 py-1 text-xs text-slate-600">{{ tag }}</span>
      }
    </div>
  </div>
</li>
